<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Widget</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:* ws://localhost:* data: blob: srt: https://fonts.googleapis.com https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: transparent !important;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }
        
        .obs-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: transparent !important;
            overflow: hidden;
        }

        video {
            width: 100%; height: 100%;
            object-fit: cover; /* Ensures no black bars in OBS */
            background-color: transparent !important;
        }

        /* Overlays styled exactly like the main dashboard */
        .cam-render-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }

        .overlay-item-text {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 18px;
            align-self: flex-start;
            color: #fff;
            border-left: 4px solid #3B82F6;
        }

        .overlay-item-clock {
            background: rgba(0, 0, 0, 0.7);
            font-family: 'JetBrains Mono', monospace;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 16px;
            align-self: flex-end;
            color: #F59E0B;
        }

        .overlay-item-watermark {
            max-width: 100px;
            max-height: 100px;
            opacity: 0.8;
            object-fit: contain;
            align-self: flex-end;
            margin-top: auto;
        }

        .overlay-item-html {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 16px;
            align-self: center;
        }
    </style>
</head>
<body>
    <div class="obs-container">
        <!-- IMPORTANT: No 'muted' attribute so OBS receives audio -->
        <video id="obs-video" autoplay playsinline></video>
        <div id="overlays-root"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cam = urlParams.get('cam') || '1';
        const uid = urlParams.get('uid');
        const streamName = `cam${cam}`;

        // Elements
        const vidElement = document.getElementById('obs-video');
        const overlaysRoot = document.getElementById('overlays-root');

        if (!uid || uid === 'null') {
            console.error("Authentication Failed: UID missing.");
            // Render basic error watermark
            const errDiv = document.createElement('div');
            errDiv.style.cssText = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:red; font-size:20px; font-weight:bold; background:black; padding:10px;";
            errDiv.textContent = "OBS ERROR: UID VALIDATION FAILED";
            document.body.appendChild(errDiv);
        } else {
            console.log(`Connecting WebRTC for Cam ${cam} with UID ${uid}...`);
            startWebRTC(vidElement, streamName);
            
            // Initial overlays rendering
            updateOverlays();
            
            // Listen for overlay modifications from dashboard
            window.addEventListener('storage', updateOverlays);
            
            // Keep clock ticking
            setInterval(updateClocks, 1000);
        }

        async function startWebRTC(videoElement, streamName) {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            const remoteStream = new MediaStream();

            pc.ontrack = (event) => {
                remoteStream.addTrack(event.track);
                videoElement.srcObject = remoteStream;
                videoElement.play().catch((err) => {
                    console.warn("Autoplay blocked in OBS. Adding interaction click fallback.", err);
                    const playOnInteraction = () => {
                        videoElement.play().catch(() => {});
                        document.removeEventListener('click', playOnInteraction);
                    };
                    document.addEventListener('click', playOnInteraction);
                });
            };

            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                if (pc.iceGatheringState !== 'complete') {
                    await new Promise(resolve => {
                        pc.onicegatheringstatechange = () => {
                            if (pc.iceGatheringState === 'complete') resolve();
                        };
                        setTimeout(resolve, 2000);
                    });
                }

                const response = await fetch(`http://${window.location.hostname}:8889/${streamName}/whep`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp
                });

                if (response.ok) {
                    const answerSdp = await response.text();
                    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
                } else {
                    pc.close();
                    setTimeout(() => startWebRTC(videoElement, streamName), 2000);
                    return;
                }
            } catch (e) {
                pc.close();
                setTimeout(() => startWebRTC(videoElement, streamName), 2000);
                return;
            }

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    pc.close();
                    setTimeout(() => startWebRTC(videoElement, streamName), 2000);
                }
            };
        }

        // --- OVERLAY RENDER LOGIC ---
        function getOverlaySettings() {
            try {
                const raw = localStorage.getItem('vignus_overlays');
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            return {
                textEnabled: false,
                textContent: '',
                clockEnabled: false,
                watermarkEnabled: false,
                watermarkUrl: '',
                htmlEnabled: false,
                htmlContent: ''
            };
        }

        function updateOverlays() {
            overlaysRoot.innerHTML = '';
            
            // Check tier: Overlays only available in Pro tier
            // We read the current tier saved by the dashboard
            const tier = localStorage.getItem('vignus_user_tier') || 'free';
            if (tier !== 'pro') return;

            const settings = getOverlaySettings();
            const hasAnyOverlay = settings.textEnabled || settings.clockEnabled || settings.watermarkEnabled || settings.htmlEnabled;
            if (!hasAnyOverlay) return;

            const overlayContainer = document.createElement('div');
            overlayContainer.className = 'cam-render-overlay';

            if (settings.textEnabled && settings.textContent) {
                const textDiv = document.createElement('div');
                textDiv.className = 'overlay-item-text';
                textDiv.textContent = settings.textContent;
                overlayContainer.appendChild(textDiv);
            }

            if (settings.clockEnabled) {
                const clockDiv = document.createElement('div');
                clockDiv.className = 'overlay-item-clock';
                clockDiv.textContent = '--:--:-- WIB';
                overlayContainer.appendChild(clockDiv);
            }

            if (settings.watermarkEnabled) {
                const img = document.createElement('img');
                img.className = 'overlay-item-watermark';
                img.src = settings.watermarkUrl || 'https://vignus.live/favicon.svg';
                img.onerror = () => { img.style.display = 'none'; };
                overlayContainer.appendChild(img);
            }

            if (settings.htmlEnabled && settings.htmlContent) {
                const htmlDiv = document.createElement('div');
                htmlDiv.className = 'overlay-item-html';
                htmlDiv.innerHTML = settings.htmlContent;
                overlayContainer.appendChild(htmlDiv);
            }

            overlaysRoot.appendChild(overlayContainer);
            updateClocks();
        }

        function updateClocks() {
            const clocks = document.querySelectorAll('.overlay-item-clock');
            if (clocks.length === 0) return;
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' WIB';
            
            clocks.forEach(clock => {
                clock.textContent = timeString;
            });
        }
    </script>
</body>
</html>
